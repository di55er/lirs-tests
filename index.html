<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מה אתם יותר? 🤔</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤔</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Home Screen -->
        <div id="home" class="screen active">
            <header class="hero">
                <h1>מה אתם יותר? 🤔</h1>
                <p>בחרו חידון וגלו מי אתם באמת!</p>
            </header>
            <main id="quiz-grid" class="quiz-grid"></main>
            <footer class="footer">נבנה באהבה ❤️</footer>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz" class="screen">
            <div class="quiz-header">
                <button onclick="goHome()" class="back-btn">🏠 חזרה</button>
                <span id="question-counter" class="counter"></span>
            </div>
            <h2 id="quiz-title" class="quiz-title"></h2>
            <div class="progress-wrap">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="choices" class="choices"></div>
        </div>

        <!-- Result Screen -->
        <div id="result" class="screen">
            <div class="result-box">
                <div id="result-emoji" class="result-emoji"></div>
                <h2 id="result-title" class="result-title"></h2>
                <p id="result-desc" class="result-desc"></p>
                <div id="result-bar" class="result-bar"></div>
                <div class="result-actions">
                    <button onclick="retryQuiz()" class="btn btn-primary">🔄 שחקו שוב</button>
                    <button onclick="shareResult()" class="btn btn-share">📤 שתפו</button>
                    <button onclick="goHome()" class="btn btn-secondary">🏠 כל החידונים</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
